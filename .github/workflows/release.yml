name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build universal DMG
        run: make dmg ARCHS="--arch arm64 --arch x86_64"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/QuickLaunch.dmg
